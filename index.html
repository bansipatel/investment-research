<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bansi Patel — Investment Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #0f1f3d;
      color: #fff;
      padding: 48px 64px 40px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.9rem;
      color: #8a9bbf;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 32px;
    }

    section {
      margin-bottom: 60px;
    }

    section h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0dc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
      padding: 0 12px 10px 0;
    }

    tbody tr {
      border-top: 1px solid #e8e8e4;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: #eeeee9;
    }

    tbody td {
      padding: 14px 12px 14px 0;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    td.date { color: #888; font-size: 0.82rem; white-space: nowrap; width: 110px; }
    td.ticker { font-weight: 600; width: 90px; }
    td.name { color: #333; }

    td.action { text-align: right; white-space: nowrap; width: 80px; }

    td.action a {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #0f1f3d;
      text-decoration: none;
      border: 1px solid #c8c8c0;
      border-radius: 4px;
      padding: 5px 12px;
      transition: all 0.15s;
    }

    td.action a:hover {
      background: #0f1f3d;
      border-color: #0f1f3d;
      color: #fff;
    }

    .empty {
      font-size: 0.85rem;
      color: #bbb;
      padding: 24px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>Investment Research</h1>
    <p>Bansi Patel</p>
  </header>

  <main>

    <section>
      <h2>Equity Pitches</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Ticker</th>
            <th>Company</th>
            <th></th>
          </tr>
        </thead>
        <tbody>

          <!-- To add a report, copy the block below, fill in the fields, and save.
               File path example: Equity Pitches/AAPL_2026-06-03.pdf
          <tr>
            <td class="date">2026-06-03</td>
            <td class="ticker">AAPL</td>
            <td class="name">Apple Inc.</td>
            <td class="action"><a href="Equity Pitches/AAPL_2026-06-03.pdf" target="_blank">View</a></td>
          </tr>
          -->

          <tr><td colspan="4" class="empty">No reports yet.</td></tr>

        </tbody>
      </table>
    </section>

    <section>
      <h2>Credit Pitches</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Issuer</th>
            <th>Name</th>
            <th></th>
          </tr>
        </thead>
        <tbody>

          <!-- To add a report, copy the block below, fill in the fields, and save.
               File path example: Credit Pitches/XYZ_2026-06-03.pdf
          <tr>
            <td class="date">2026-06-03</td>
            <td class="ticker">XYZ Corp</td>
            <td class="name">Senior Secured Notes Due 2030</td>
            <td class="action"><a href="Credit Pitches/XYZ_2026-06-03.pdf" target="_blank">View</a></td>
          </tr>
          -->

          <tr>
            <td class="date">2026-06-03</td>
            <td class="ticker">Okta</td>
            <td class="name">Credit Pitch</td>
            <td class="action"><a href="Credit%20Pitches/Okta%20Pitch%20-%20Bansi%20Patel.pdf" target="_blank">View</a></td>
          </tr>
          <tr>
            <td class="date">2026-06-03</td>
            <td class="ticker">Okta</td>
            <td class="name">DCF</td>
            <td class="action"><a href="Credit%20Pitches/Okta%20DCF%20-%20Bansi%20Patel.pdf" target="_blank">View</a></td>
          </tr>

        </tbody>
      </table>
    </section>

  </main>

</body>
</html>
