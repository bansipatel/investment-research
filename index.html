<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bansi Patel, CFA — Investment Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f4f4f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #0f1f3d;
      color: #fff;
      padding: 52px 64px 44px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.82rem;
      color: #7a8fb5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 52px 32px 40px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 14px;
    }

    /* ── Company card ── */
    .company-card {
      background: #fff;
      border: 1px solid #e4e4e0;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .company-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #ececea;
    }

    .ticker {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      background: #0f1f3d;
      padding: 4px 9px;
      border-radius: 4px;
    }

    .company-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .company-date {
      margin-left: auto;
      font-size: 0.78rem;
      color: #aaa;
    }

    /* ── Document rows ── */
    .doc-row {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #f0f0ee;
      transition: background 0.1s;
    }

    .doc-row:hover {
      background: #f9f9f7;
    }

    .doc-type {
      font-size: 0.85rem;
      color: #444;
      flex: 1;
    }

    .doc-row a {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #0f1f3d;
      text-decoration: none;
      border: 1px solid #c8c8c0;
      border-radius: 4px;
      padding: 5px 14px;
      transition: all 0.15s;
    }

    .doc-row a:hover {
      background: #0f1f3d;
      border-color: #0f1f3d;
      color: #fff;
    }

    section {
      margin-bottom: 48px;
    }

    .empty {
      font-size: 0.85rem;
      color: #bbb;
      font-style: italic;
      padding: 20px 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 28px 32px;
      font-size: 0.73rem;
      color: #bbb;
      letter-spacing: 0.04em;
      border-top: 1px solid #e4e4e0;
      background: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Investment Research</h1>
    <p>Bansi Patel, CFA</p>
  </header>

  <main>

    <section>
      <p class="section-label">Equity Pitches</p>

      <!-- OKTA -->
      <div class="company-card">
        <div class="company-header">
          <span class="ticker">OKTA</span>
          <span class="company-name">Okta, Inc.</span>
          <span class="company-date">Jun 2026</span>
        </div>
        <div class="doc-row">
          <span class="doc-type">DCF</span>
          <a href="Equity%20Pitches/Okta%20DCF%20-%20Bansi%20Patel.pdf" target="_blank">View</a>
        </div>
      </div>

      <!-- Add new equity company cards above this line -->

    </section>

    <section>
      <p class="section-label">Credit Pitches</p>

      <!-- EMBC -->
      <div class="company-card">
        <div class="company-header">
          <span class="ticker">EMBC</span>
          <span class="company-name">Embecta Corp</span>
          <span class="company-date">Jun 2026</span>
        </div>
        <div class="doc-row">
          <span class="doc-type">Credit Review</span>
          <a href="Credit%20Pitches/Embecta%20Corp%20Credit%20Review%20-%20Bansi%20Patel%20-%20Updated.pdf" target="_blank">View</a>
        </div>
      </div>

      <!-- Add new credit company cards above this line -->

    </section>

  </main>

  <footer>
    © 2026 Bansi Patel, CFA &nbsp;|&nbsp; Not for Redistribution
  </footer>

</body>
</html>
